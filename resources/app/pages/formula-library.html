<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Math Genius - Formula Library</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/formula.css">
</head>

<body>

    <!-- Header -->
    <header class="formula-header">
        <h1>📚 Formula Library</h1>
        <p>Search • Learn • Discover</p>
    </header>

    <!-- Search -->
    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Search Formula..."
        >

        <button id="showAllBtn">
            Show All
        </button>

    </section>

    <!-- Categories -->
    <section>

        <h2>Categories</h2>

        <div id="categoryList" class="category-grid"></div>

    </section>

    <!-- Formula List -->
    <section>

        <h2>Formulas</h2>

        <div id="formulaList" class="formula-grid"></div>

    </section>

    <!-- Footer -->
    <footer class="formula-footer">
        © 2026 Math Genius
    </footer>

    <!-- JavaScript -->
    <script src="../js/formula.js"></script>

</body>

</html>
